<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chain of Custody — BioBots 1</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #f87171;
            --purple: #a78bfa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p { color: var(--muted); margin-top: 0.5rem; }

        .container { max-width: 1100px; margin: 0 auto; }

        .stats-bar {
            display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 0.8rem 1.2rem; text-align: center; min-width: 110px;
        }
        .stat-card .value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .panel h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }

        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem; margin-bottom: 1rem;
        }
        .form-group label {
            display: block; font-size: 0.75rem; color: var(--muted);
            text-transform: uppercase; margin-bottom: 0.3rem; letter-spacing: 0.05em;
        }
        input, select, textarea {
            width: 100%; padding: 0.5rem 0.7rem; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 0.9rem; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--accent);
        }
        textarea { resize: vertical; min-height: 60px; }

        .btn {
            padding: 0.5rem 1.2rem; border: none; border-radius: 8px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-success { background: var(--success); color: var(--bg); }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger { background: var(--error); color: #fff; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent; border: 1px solid var(--border); color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }

        /* Timeline */
        .timeline { position: relative; padding-left: 2rem; }
        .timeline::before {
            content: ''; position: absolute; left: 0.6rem; top: 0; bottom: 0;
            width: 2px; background: var(--border);
        }
        .timeline-event {
            position: relative; margin-bottom: 1.5rem; padding: 1rem;
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
        }
        .timeline-event::before {
            content: ''; position: absolute; left: -1.7rem; top: 1.2rem;
            width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
            border: 2px solid var(--surface);
        }
        .timeline-event.transfer::before { background: var(--purple); }
        .timeline-event.condition::before { background: var(--warning); }
        .timeline-event.disposed::before { background: var(--error); }
        .timeline-event.created::before { background: var(--success); }

        .event-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.3rem;
        }
        .event-type {
            font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 20px;
            text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em;
        }
        .event-type.created { background: rgba(74,222,128,0.15); color: var(--success); }
        .event-type.transfer { background: rgba(167,139,250,0.15); color: var(--purple); }
        .event-type.condition { background: rgba(251,191,36,0.15); color: var(--warning); }
        .event-type.disposed { background: rgba(248,113,113,0.15); color: var(--error); }
        .event-time { font-size: 0.75rem; color: var(--muted); }
        .event-detail { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
        .event-detail strong { color: var(--accent); }

        /* Sample cards */
        .sample-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .sample-card {
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 1rem; cursor: pointer; transition: all 0.2s;
        }
        .sample-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .sample-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .sample-card h3 { font-size: 0.95rem; margin-bottom: 0.3rem; }
        .sample-card .meta { font-size: 0.75rem; color: var(--muted); }
        .sample-card .status-badge {
            display: inline-block; font-size: 0.65rem; padding: 0.1rem 0.4rem;
            border-radius: 10px; margin-top: 0.3rem; font-weight: 600;
        }
        .status-active { background: rgba(74,222,128,0.15); color: var(--success); }
        .status-disposed { background: rgba(248,113,113,0.15); color: var(--error); }

        .search-bar {
            display: flex; gap: 0.5rem; margin-bottom: 1rem;
        }
        .search-bar input { flex: 1; }

        .empty-state {
            text-align: center; padding: 3rem 1rem; color: var(--muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }

        .export-bar { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .sample-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🔗 Chain of Custody</h1>
        <p>Track sample transfers, conditions, and full audit trail</p>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card"><div class="value" id="statTotal">0</div><div class="label">Samples</div></div>
            <div class="stat-card"><div class="value" id="statActive">0</div><div class="label">Active</div></div>
            <div class="stat-card"><div class="value" id="statTransfers">0</div><div class="label">Transfers</div></div>
            <div class="stat-card"><div class="value" id="statAlerts">0</div><div class="label">Alerts</div></div>
        </div>

        <!-- Register Sample -->
        <div class="panel" id="registerPanel">
            <h2>📝 Register New Sample</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Sample ID</label>
                    <input type="text" id="sampleId" placeholder="e.g., BIO-2026-0042" />
                </div>
                <div class="form-group">
                    <label>Sample Type</label>
                    <select id="sampleType">
                        <option value="bioink">Bioink</option>
                        <option value="cell-line">Cell Line</option>
                        <option value="scaffold">Scaffold</option>
                        <option value="tissue-construct">Tissue Construct</option>
                        <option value="reagent">Reagent</option>
                        <option value="media">Growth Media</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Custodian</label>
                    <input type="text" id="custodian" placeholder="Name or initials" />
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="e.g., Freezer A, Shelf 3" />
                </div>
                <div class="form-group">
                    <label>Storage Condition</label>
                    <select id="storageCondition">
                        <option value="room-temp">Room Temp (20-25°C)</option>
                        <option value="refrigerated">Refrigerated (2-8°C)</option>
                        <option value="frozen-20">Frozen (-20°C)</option>
                        <option value="frozen-80">Ultra-Cold (-80°C)</option>
                        <option value="cryo">Cryogenic (-196°C / LN₂)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="text" id="quantity" placeholder="e.g., 5 mL, 2 vials" />
                </div>
            </div>
            <div class="form-group" style="margin-bottom:0.8rem;">
                <label>Notes</label>
                <textarea id="registerNotes" rows="2" placeholder="Optional notes..."></textarea>
            </div>
            <button class="btn btn-success" onclick="registerSample()">Register Sample</button>
        </div>

        <!-- Sample List -->
        <div class="panel">
            <h2>📦 Samples</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by ID, type, custodian, or location..." oninput="renderSamples()" />
                <select id="filterStatus" onchange="renderSamples()">
                    <option value="all">All</option>
                    <option value="active">Active</option>
                    <option value="disposed">Disposed</option>
                </select>
            </div>
            <div class="sample-list" id="sampleList"></div>
        </div>

        <!-- Detail / Actions (shown when sample selected) -->
        <div class="panel" id="detailPanel" style="display:none;">
            <h2 id="detailTitle">Sample Detail</h2>

            <!-- Action tabs -->
            <div class="btn-group" style="margin-bottom:1rem;">
                <button class="btn btn-primary" onclick="showAction('transfer')">🔄 Transfer</button>
                <button class="btn btn-outline" onclick="showAction('condition')">🌡️ Log Condition</button>
                <button class="btn btn-danger" onclick="showAction('dispose')">🗑️ Dispose</button>
            </div>

            <!-- Transfer form -->
            <div id="actionTransfer" class="action-form" style="display:none;">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Transfer To (Custodian)</label>
                        <input type="text" id="transferTo" placeholder="New custodian" />
                    </div>
                    <div class="form-group">
                        <label>New Location</label>
                        <input type="text" id="transferLocation" placeholder="New location" />
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <input type="text" id="transferReason" placeholder="e.g., bioprinting run #12" />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0.8rem;">
                    <label>Notes</label>
                    <textarea id="transferNotes" rows="2" placeholder="Transfer notes..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="recordTransfer()">Record Transfer</button>
            </div>

            <!-- Condition form -->
            <div id="actionCondition" class="action-form" style="display:none;">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Temperature (°C)</label>
                        <input type="number" id="condTemp" step="0.1" placeholder="-80" />
                    </div>
                    <div class="form-group">
                        <label>Condition</label>
                        <select id="condStatus">
                            <option value="good">Good</option>
                            <option value="degraded">Degraded</option>
                            <option value="compromised">Compromised</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Inspected By</label>
                        <input type="text" id="condInspector" placeholder="Name" />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0.8rem;">
                    <label>Observations</label>
                    <textarea id="condNotes" rows="2" placeholder="Observations..."></textarea>
                </div>
                <button class="btn btn-outline" onclick="recordCondition()">Log Condition</button>
            </div>

            <!-- Dispose form -->
            <div id="actionDispose" class="action-form" style="display:none;">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Disposal Method</label>
                        <select id="disposeMethod">
                            <option value="autoclave">Autoclave</option>
                            <option value="chemical">Chemical Neutralization</option>
                            <option value="biohazard">Biohazard Waste</option>
                            <option value="returned">Returned to Vendor</option>
                            <option value="consumed">Fully Consumed</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Authorized By</label>
                        <input type="text" id="disposeAuth" placeholder="Name" />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0.8rem;">
                    <label>Notes</label>
                    <textarea id="disposeNotes" rows="2" placeholder="Disposal notes..."></textarea>
                </div>
                <button class="btn btn-danger" onclick="disposeSample()">Confirm Disposal</button>
            </div>

            <!-- Timeline -->
            <h2 style="margin-top:1.5rem;">📜 Audit Trail</h2>
            <div class="timeline" id="timeline"></div>

            <!-- Export -->
            <div class="export-bar">
                <button class="btn btn-outline" onclick="exportSampleJSON()">Export JSON</button>
                <button class="btn btn-outline" onclick="exportSampleCSV()">Export CSV</button>
                <button class="btn btn-outline" onclick="printCoCReport()">Print Report</button>
            </div>
        </div>
    </div>

    <script>
    'use strict';

    const STORAGE_KEY = 'biobots_chain_of_custody';
    let samples = [];
    let selectedId = null;

    function load() {
        try { samples = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { samples = []; }
    }
    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(samples));
        updateStats();
    }

    function updateStats() {
        const active = samples.filter(s => s.status === 'active');
        const totalTransfers = samples.reduce((n, s) => n + s.events.filter(e => e.type === 'transfer').length, 0);
        const alerts = samples.reduce((n, s) => n + s.events.filter(e => e.type === 'condition' && e.condition !== 'good').length, 0);
        document.getElementById('statTotal').textContent = samples.length;
        document.getElementById('statActive').textContent = active.length;
        document.getElementById('statTransfers').textContent = totalTransfers;
        document.getElementById('statAlerts').textContent = alerts;
    }

    function registerSample() {
        const id = document.getElementById('sampleId').value.trim();
        const type = document.getElementById('sampleType').value;
        const custodian = document.getElementById('custodian').value.trim();
        const location = document.getElementById('location').value.trim();
        const storage = document.getElementById('storageCondition').value;
        const quantity = document.getElementById('quantity').value.trim();
        const notes = document.getElementById('registerNotes').value.trim();

        if (!id) return alert('Sample ID is required.');
        if (!custodian) return alert('Custodian is required.');
        if (samples.find(s => s.id === id)) return alert('Sample ID already exists.');

        const sample = {
            id, type, custodian, location, storage, quantity, notes,
            status: 'active',
            createdAt: new Date().toISOString(),
            events: [{
                type: 'created',
                timestamp: new Date().toISOString(),
                custodian, location, storage, quantity,
                notes: notes || 'Sample registered'
            }]
        };
        samples.unshift(sample);
        save();
        renderSamples();
        // Clear form
        document.getElementById('sampleId').value = '';
        document.getElementById('custodian').value = '';
        document.getElementById('location').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('registerNotes').value = '';
    }

    function renderSamples() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filter = document.getElementById('filterStatus').value;
        const list = document.getElementById('sampleList');

        let filtered = samples;
        if (filter !== 'all') filtered = filtered.filter(s => s.status === filter);
        if (query) filtered = filtered.filter(s =>
            s.id.toLowerCase().includes(query) ||
            s.type.toLowerCase().includes(query) ||
            s.custodian.toLowerCase().includes(query) ||
            s.location.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No samples found</p></div>';
            return;
        }

        list.innerHTML = filtered.map(s => `
            <div class="sample-card ${s.id === selectedId ? 'active' : ''}" onclick="selectSample('${esc(s.id)}')">
                <h3>${esc(s.id)}</h3>
                <div class="meta">${esc(s.type)} · ${esc(s.custodian)} · ${esc(s.location)}</div>
                <div class="meta">${esc(s.storage)} · ${esc(s.quantity || '—')}</div>
                <span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span>
                <span style="font-size:0.7rem;color:var(--muted);margin-left:0.3rem;">${s.events.length} event${s.events.length !== 1 ? 's' : ''}</span>
            </div>
        `).join('');
    }

    function selectSample(id) {
        selectedId = id;
        renderSamples();
        const sample = samples.find(s => s.id === id);
        if (!sample) return;

        document.getElementById('detailPanel').style.display = '';
        document.getElementById('detailTitle').textContent = `🔗 ${sample.id} — ${sample.type}`;
        hideActions();
        renderTimeline(sample);

        // Disable actions if disposed
        const btns = document.querySelectorAll('#detailPanel .btn-group .btn');
        btns.forEach(b => b.disabled = sample.status === 'disposed');
    }

    function showAction(action) {
        hideActions();
        const el = document.getElementById('action' + action.charAt(0).toUpperCase() + action.slice(1));
        if (el) el.style.display = '';
    }
    function hideActions() {
        document.querySelectorAll('.action-form').forEach(f => f.style.display = 'none');
    }

    function recordTransfer() {
        const sample = samples.find(s => s.id === selectedId);
        if (!sample || sample.status !== 'active') return;
        const to = document.getElementById('transferTo').value.trim();
        const loc = document.getElementById('transferLocation').value.trim();
        const reason = document.getElementById('transferReason').value.trim();
        const notes = document.getElementById('transferNotes').value.trim();
        if (!to) return alert('New custodian is required.');

        const prev = sample.custodian;
        sample.custodian = to;
        if (loc) sample.location = loc;
        sample.events.push({
            type: 'transfer',
            timestamp: new Date().toISOString(),
            from: prev, to, location: loc || sample.location,
            reason, notes
        });
        save();
        selectSample(selectedId);
        document.getElementById('transferTo').value = '';
        document.getElementById('transferLocation').value = '';
        document.getElementById('transferReason').value = '';
        document.getElementById('transferNotes').value = '';
    }

    function recordCondition() {
        const sample = samples.find(s => s.id === selectedId);
        if (!sample || sample.status !== 'active') return;
        const temp = document.getElementById('condTemp').value;
        const condition = document.getElementById('condStatus').value;
        const inspector = document.getElementById('condInspector').value.trim();
        const notes = document.getElementById('condNotes').value.trim();

        sample.events.push({
            type: 'condition',
            timestamp: new Date().toISOString(),
            temperature: temp ? parseFloat(temp) : null,
            condition, inspector, notes
        });
        save();
        selectSample(selectedId);
        document.getElementById('condTemp').value = '';
        document.getElementById('condInspector').value = '';
        document.getElementById('condNotes').value = '';
    }

    function disposeSample() {
        const sample = samples.find(s => s.id === selectedId);
        if (!sample || sample.status !== 'active') return;
        const method = document.getElementById('disposeMethod').value;
        const auth = document.getElementById('disposeAuth').value.trim();
        const notes = document.getElementById('disposeNotes').value.trim();
        if (!auth) return alert('Authorization is required for disposal.');

        if (!confirm(`Dispose sample ${sample.id}? This cannot be undone.`)) return;

        sample.status = 'disposed';
        sample.events.push({
            type: 'disposed',
            timestamp: new Date().toISOString(),
            method, authorizedBy: auth, notes
        });
        save();
        selectSample(selectedId);
        renderSamples();
    }

    function renderTimeline(sample) {
        const tl = document.getElementById('timeline');
        const events = [...sample.events].reverse();
        if (events.length === 0) {
            tl.innerHTML = '<div class="empty-state"><p>No events recorded</p></div>';
            return;
        }
        tl.innerHTML = events.map(e => {
            const time = new Date(e.timestamp).toLocaleString();
            let detail = '';
            switch (e.type) {
                case 'created':
                    detail = `Registered by <strong>${esc(e.custodian)}</strong> at <strong>${esc(e.location)}</strong>` +
                        (e.quantity ? ` · Qty: ${esc(e.quantity)}` : '') +
                        (e.notes ? `<br>${esc(e.notes)}` : '');
                    break;
                case 'transfer':
                    detail = `<strong>${esc(e.from)}</strong> → <strong>${esc(e.to)}</strong> at <strong>${esc(e.location)}</strong>` +
                        (e.reason ? ` · Reason: ${esc(e.reason)}` : '') +
                        (e.notes ? `<br>${esc(e.notes)}` : '');
                    break;
                case 'condition':
                    detail = `Condition: <strong>${esc(e.condition)}</strong>` +
                        (e.temperature != null ? ` · ${e.temperature}°C` : '') +
                        (e.inspector ? ` · Inspector: ${esc(e.inspector)}` : '') +
                        (e.notes ? `<br>${esc(e.notes)}` : '');
                    break;
                case 'disposed':
                    detail = `Method: <strong>${esc(e.method)}</strong> · Authorized by: <strong>${esc(e.authorizedBy)}</strong>` +
                        (e.notes ? `<br>${esc(e.notes)}` : '');
                    break;
            }
            return `<div class="timeline-event ${e.type}">
                <div class="event-header">
                    <span class="event-type ${e.type}">${e.type}</span>
                    <span class="event-time">${time}</span>
                </div>
                <div class="event-detail">${detail}</div>
            </div>`;
        }).join('');
    }

    function esc(s) {
        if (s == null) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    // Export functions
    function exportSampleJSON() {
        const sample = samples.find(s => s.id === selectedId);
        if (!sample) return;
        const blob = new Blob([JSON.stringify(sample, null, 2)], { type: 'application/json' });
        downloadBlob(blob, `coc-${sample.id}.json`);
    }

    function exportSampleCSV() {
        const sample = samples.find(s => s.id === selectedId);
        if (!sample) return;
        const headers = ['Timestamp', 'Event', 'From', 'To', 'Location', 'Condition', 'Temperature', 'Notes'];
        const rows = sample.events.map(e => [
            e.timestamp,
            e.type,
            e.from || e.custodian || '',
            e.to || '',
            e.location || '',
            e.condition || '',
            e.temperature != null ? e.temperature : '',
            (e.reason ? e.reason + '. ' : '') + (e.notes || '')
        ]);
        const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        downloadBlob(new Blob([csv], { type: 'text/csv' }), `coc-${sample.id}.csv`);
    }

    function printCoCReport() {
        const sample = samples.find(s => s.id === selectedId);
        if (!sample) return;
        const w = window.open('', '_blank');
        const events = sample.events.map(e => {
            const t = new Date(e.timestamp).toLocaleString();
            switch (e.type) {
                case 'created': return `<tr><td>${t}</td><td>Created</td><td>${esc(e.custodian)}</td><td>${esc(e.location)}</td><td>${esc(e.notes || '')}</td></tr>`;
                case 'transfer': return `<tr><td>${t}</td><td>Transfer</td><td>${esc(e.from)} → ${esc(e.to)}</td><td>${esc(e.location)}</td><td>${esc(e.reason || '')} ${esc(e.notes || '')}</td></tr>`;
                case 'condition': return `<tr><td>${t}</td><td>Condition: ${esc(e.condition)}</td><td>${esc(e.inspector || '')}</td><td>${e.temperature != null ? e.temperature + '°C' : ''}</td><td>${esc(e.notes || '')}</td></tr>`;
                case 'disposed': return `<tr><td>${t}</td><td>Disposed (${esc(e.method)})</td><td>${esc(e.authorizedBy)}</td><td></td><td>${esc(e.notes || '')}</td></tr>`;
                default: return '';
            }
        }).join('');
        w.document.write(`<!DOCTYPE html><html><head><title>CoC Report — ${esc(sample.id)}</title>
        <style>body{font-family:serif;padding:2rem;color:#000}h1{font-size:1.3rem}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{border:1px solid #333;padding:0.4rem 0.6rem;font-size:0.8rem;text-align:left}th{background:#eee}.meta{margin:0.5rem 0;font-size:0.9rem}.sig{margin-top:2rem;border-top:1px solid #000;width:200px;padding-top:0.3rem;font-size:0.8rem}</style></head><body>
        <h1>🔗 Chain of Custody Report</h1>
        <div class="meta"><strong>Sample:</strong> ${esc(sample.id)} · <strong>Type:</strong> ${esc(sample.type)} · <strong>Status:</strong> ${sample.status}</div>
        <div class="meta"><strong>Current Custodian:</strong> ${esc(sample.custodian)} · <strong>Location:</strong> ${esc(sample.location)}</div>
        <div class="meta"><strong>Storage:</strong> ${esc(sample.storage)} · <strong>Quantity:</strong> ${esc(sample.quantity || '—')}</div>
        <div class="meta"><strong>Created:</strong> ${new Date(sample.createdAt).toLocaleString()} · <strong>Report Generated:</strong> ${new Date().toLocaleString()}</div>
        <table><thead><tr><th>Timestamp</th><th>Event</th><th>Person</th><th>Location/Temp</th><th>Notes</th></tr></thead><tbody>${events}</tbody></table>
        <div class="sig">Signature / Date</div>
        </body></html>`);
        w.document.close();
        w.print();
    }

    function downloadBlob(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // Init
    load();
    updateStats();
    renderSamples();
    </script>
    <script src="shared/commandPalette.js"></script>
</body>
</html>
