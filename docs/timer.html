<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Timer — BioBots 1</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        header p { color: var(--muted); margin-top: 0.5rem; }

        nav { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        nav a {
            color: var(--muted); padding: 0.5rem 1rem; border-radius: 8px;
            text-decoration: none; font-size: 0.9rem; transition: all 0.2s;
        }
        nav a.active {
            color: var(--accent); background: var(--surface);
            border: 1px solid var(--border);
        }
        nav a:hover { color: var(--accent); }

        .container { max-width: 900px; margin: 0 auto; }

        .preset-section { margin-bottom: 2rem; }
        .preset-section h2 { color: var(--muted); font-size: 1rem; font-weight: 500; margin-bottom: 0.75rem; }
        .preset-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
        }
        .preset-btn {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            text-align: left; transition: all 0.2s;
        }
        .preset-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
        .preset-btn .preset-name { font-weight: 600; }
        .preset-btn .preset-time { color: var(--muted); font-size: 0.8rem; }

        .custom-section {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 2rem; display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap;
        }
        .field { display: flex; flex-direction: column; gap: 0.3rem; }
        .field label { font-size: 0.8rem; color: var(--muted); }
        .field input, .field select {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 0.5rem 0.7rem; border-radius: 6px; font-size: 0.9rem; width: 100px;
        }
        .field input:focus, .field select:focus { border-color: var(--accent); outline: none; }
        .field input[type="text"] { width: 180px; }

        .add-btn {
            background: var(--accent); color: var(--bg); border: none;
            padding: 0.5rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer;
            font-size: 0.9rem; transition: all 0.2s;
        }
        .add-btn:hover { background: var(--accent-hover); }

        .timers-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;
        }
        .timers-header h2 { color: var(--muted); font-size: 1rem; font-weight: 500; }
        .clear-btn {
            background: none; border: 1px solid var(--border); color: var(--muted);
            padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .clear-btn:hover { border-color: var(--error); color: var(--error); }

        .timer-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .timer-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1.5rem;
            transition: border-color 0.3s;
        }
        .timer-card.running { border-color: var(--accent); }
        .timer-card.paused { border-color: var(--warning); }
        .timer-card.done { border-color: var(--success); animation: pulse 1s ease-in-out infinite; }
        .timer-card.overdue { border-color: var(--error); animation: pulse 0.5s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .timer-display {
            font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums;
            min-width: 140px; text-align: center;
        }
        .timer-card.done .timer-display { color: var(--success); }
        .timer-card.overdue .timer-display { color: var(--error); }

        .timer-info { flex: 1; }
        .timer-name { font-weight: 600; font-size: 1rem; }
        .timer-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }

        .timer-controls { display: flex; gap: 0.4rem; }
        .timer-controls button {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            transition: all 0.2s;
        }
        .timer-controls button:hover { border-color: var(--accent); }

        .progress-bar {
            width: 100%; height: 4px; background: var(--bg); border-radius: 2px;
            margin-top: 0.5rem; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--accent); border-radius: 2px;
            transition: width 1s linear;
        }
        .timer-card.done .progress-fill { background: var(--success); }
        .timer-card.overdue .progress-fill { background: var(--error); }

        .empty-state {
            text-align: center; color: var(--muted); padding: 3rem;
            background: var(--surface); border: 1px dashed var(--border); border-radius: 12px;
        }

        @media (max-width: 600px) {
            .timer-card { flex-direction: column; text-align: center; gap: 0.75rem; }
            .timer-display { min-width: auto; }
            .custom-section { flex-direction: column; }
            .field input, .field select { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>⏱️ Lab Timer</h1>
        <p>Run multiple concurrent timers for bioprinting protocols, incubations, and lab procedures</p>
    </header>

    <nav>
        <a href="index.html">Query Tool</a>
        <a href="explorer.html">Data Explorer</a>
        <a href="calculator.html">🧮 Calculator</a>
        <a href="protocol.html">📋 Protocol Library</a>
        <a href="timer.html" class="active">⏱️ Lab Timer</a>
    </nav>

    <div class="container">
        <!-- Preset Timers -->
        <div class="preset-section">
            <h2>Quick Start — Common Protocols</h2>
            <div class="preset-grid" id="presetGrid"></div>
        </div>

        <!-- Custom Timer -->
        <div class="custom-section">
            <div class="field">
                <label>Label</label>
                <input type="text" id="customLabel" placeholder="e.g., Trypsin wash" />
            </div>
            <div class="field">
                <label>Hours</label>
                <input type="number" id="customH" min="0" max="99" value="0" />
            </div>
            <div class="field">
                <label>Minutes</label>
                <input type="number" id="customM" min="0" max="59" value="5" />
            </div>
            <div class="field">
                <label>Seconds</label>
                <input type="number" id="customS" min="0" max="59" value="0" />
            </div>
            <button class="add-btn" onclick="addCustomTimer()">+ Add Timer</button>
        </div>

        <!-- Active Timers -->
        <div class="timers-header">
            <h2>Active Timers (<span id="timerCount">0</span>)</h2>
            <button class="clear-btn" onclick="clearDone()">Clear Finished</button>
        </div>
        <div class="timer-list" id="timerList">
            <div class="empty-state" id="emptyState">
                No active timers. Click a preset or add a custom timer to get started.
            </div>
        </div>
    </div>

    <script>
    const PRESETS = [
        { name: 'Trypsin Detach', sec: 180, cat: 'Cell Culture' },
        { name: 'Centrifuge (cells)', sec: 300, cat: 'Cell Culture' },
        { name: 'PBS Wash', sec: 120, cat: 'Cell Culture' },
        { name: 'Media Warm-up', sec: 1200, cat: 'Cell Culture' },
        { name: 'Trypan Blue Stain', sec: 120, cat: 'Cell Culture' },
        { name: 'UV Crosslink (low)', sec: 30, cat: 'Crosslinking' },
        { name: 'UV Crosslink (med)', sec: 60, cat: 'Crosslinking' },
        { name: 'UV Crosslink (high)', sec: 120, cat: 'Crosslinking' },
        { name: 'CaCl₂ Crosslink', sec: 300, cat: 'Crosslinking' },
        { name: 'Ionic Gelation', sec: 600, cat: 'Crosslinking' },
        { name: 'Live/Dead Stain', sec: 1800, cat: 'Staining' },
        { name: 'DAPI Stain', sec: 600, cat: 'Staining' },
        { name: 'Fixation (4% PFA)', sec: 900, cat: 'Staining' },
        { name: 'Blocking Buffer', sec: 3600, cat: 'Staining' },
        { name: 'Primary Antibody', sec: 7200, cat: 'Staining' },
        { name: 'Overnight Incubation', sec: 57600, cat: 'Incubation' },
        { name: '37°C Incubation (1h)', sec: 3600, cat: 'Incubation' },
        { name: 'Gelatin Coating', sec: 1800, cat: 'Incubation' },
        { name: 'Nozzle Prime', sec: 60, cat: 'Print Prep' },
        { name: 'Bioink Equilibrate', sec: 900, cat: 'Print Prep' },
        { name: 'Syringe Degas', sec: 1200, cat: 'Print Prep' },
        { name: 'Autoclave Cycle', sec: 1200, cat: 'Sterilization' },
        { name: 'UV Cabinet (30 min)', sec: 1800, cat: 'Sterilization' },
        { name: 'Ethanol Soak', sec: 600, cat: 'Sterilization' },
    ];

    let timers = [];
    let nextId = 1;
    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function playAlarm() {
        try {
            const ctx = getAudioCtx();
            const playBeep = (freq, start, dur) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + dur);
                osc.start(ctx.currentTime + start);
                osc.stop(ctx.currentTime + start + dur);
            };
            for (let i = 0; i < 3; i++) {
                playBeep(880, i * 0.3, 0.2);
                playBeep(1100, i * 0.3 + 0.1, 0.15);
            }
        } catch(e) {}
    }

    function fmtTime(totalSec) {
        const neg = totalSec < 0;
        const abs = Math.abs(totalSec);
        const h = Math.floor(abs / 3600);
        const m = Math.floor((abs % 3600) / 60);
        const s = abs % 60;
        const pad = n => String(n).padStart(2, '0');
        const t = h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        return neg ? `+${t}` : t;
    }

    function fmtDuration(sec) {
        if (sec >= 3600) return `${(sec/3600).toFixed(1)}h`;
        if (sec >= 60) return `${Math.round(sec/60)}m`;
        return `${sec}s`;
    }

    function renderPresets() {
        const grid = document.getElementById('presetGrid');
        const cats = [...new Set(PRESETS.map(p => p.cat))];
        grid.innerHTML = '';
        cats.forEach(cat => {
            const items = PRESETS.filter(p => p.cat === cat);
            items.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.innerHTML = `<div class="preset-name">${p.name}</div><div class="preset-time">${fmtDuration(p.sec)}</div>`;
                btn.onclick = () => addTimer(p.name, p.sec);
                grid.appendChild(btn);
            });
        });
    }

    function addTimer(name, totalSec) {
        const timer = {
            id: nextId++,
            name,
            totalSec,
            remaining: totalSec,
            state: 'running', // running | paused | done | overdue
            startedAt: Date.now(),
            intervalId: null,
            alarmPlayed: false,
        };
        timers.unshift(timer);
        startTicking(timer);
        renderTimers();
    }

    function addCustomTimer() {
        const label = document.getElementById('customLabel').value.trim() || 'Custom Timer';
        const h = parseInt(document.getElementById('customH').value) || 0;
        const m = parseInt(document.getElementById('customM').value) || 0;
        const s = parseInt(document.getElementById('customS').value) || 0;
        const total = h * 3600 + m * 60 + s;
        if (total <= 0) return;
        addTimer(label, total);
        document.getElementById('customLabel').value = '';
    }

    function startTicking(timer) {
        if (timer.intervalId) clearInterval(timer.intervalId);
        timer.intervalId = setInterval(() => {
            timer.remaining--;
            if (timer.remaining <= 0 && timer.state === 'running') {
                timer.state = timer.remaining === 0 ? 'done' : 'overdue';
                if (!timer.alarmPlayed) { playAlarm(); timer.alarmPlayed = true; }
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(`⏱️ ${timer.name}`, { body: 'Timer complete!', icon: '🧬' });
                }
            }
            if (timer.remaining < 0) timer.state = 'overdue';
            updateTimerDOM(timer);
        }, 1000);
    }

    function togglePause(id) {
        const t = timers.find(t => t.id === id);
        if (!t) return;
        if (t.state === 'running') {
            t.state = 'paused';
            clearInterval(t.intervalId);
            t.intervalId = null;
        } else if (t.state === 'paused') {
            t.state = 'running';
            startTicking(t);
        }
        renderTimers();
    }

    function resetTimer(id) {
        const t = timers.find(t => t.id === id);
        if (!t) return;
        if (t.intervalId) clearInterval(t.intervalId);
        t.remaining = t.totalSec;
        t.state = 'running';
        t.alarmPlayed = false;
        startTicking(t);
        renderTimers();
    }

    function removeTimer(id) {
        const t = timers.find(t => t.id === id);
        if (t && t.intervalId) clearInterval(t.intervalId);
        timers = timers.filter(t => t.id !== id);
        renderTimers();
    }

    function clearDone() {
        timers.filter(t => t.state === 'done' || t.state === 'overdue').forEach(t => {
            if (t.intervalId) clearInterval(t.intervalId);
        });
        timers = timers.filter(t => t.state !== 'done' && t.state !== 'overdue');
        renderTimers();
    }

    function updateTimerDOM(t) {
        const el = document.getElementById(`timer-${t.id}`);
        if (!el) return;
        el.className = `timer-card ${t.state}`;
        el.querySelector('.timer-display').textContent = fmtTime(t.remaining);
        const pct = t.totalSec > 0 ? Math.max(0, Math.min(100, ((t.totalSec - t.remaining) / t.totalSec) * 100)) : 100;
        el.querySelector('.progress-fill').style.width = `${Math.min(pct, 100)}%`;
        const meta = el.querySelector('.timer-meta');
        if (t.state === 'done') meta.textContent = '✅ Complete!';
        else if (t.state === 'overdue') meta.textContent = `⚠️ Overdue by ${fmtTime(t.remaining)}`;
        else if (t.state === 'paused') meta.textContent = `⏸️ Paused — ${fmtDuration(t.totalSec)} total`;
        else meta.textContent = `${fmtDuration(t.totalSec)} total`;
    }

    function renderTimers() {
        const list = document.getElementById('timerList');
        const empty = document.getElementById('emptyState');
        const count = document.getElementById('timerCount');
        count.textContent = timers.length;

        if (timers.length === 0) {
            list.innerHTML = '';
            list.appendChild(empty);
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';

        list.innerHTML = timers.map(t => {
            const pct = t.totalSec > 0 ? Math.max(0, Math.min(100, ((t.totalSec - t.remaining) / t.totalSec) * 100)) : 100;
            const pauseIcon = t.state === 'paused' ? '▶' : '⏸';
            const meta = t.state === 'done' ? '✅ Complete!'
                : t.state === 'overdue' ? `⚠️ Overdue by ${fmtTime(t.remaining)}`
                : t.state === 'paused' ? `⏸️ Paused — ${fmtDuration(t.totalSec)} total`
                : `${fmtDuration(t.totalSec)} total`;
            return `
            <div class="timer-card ${t.state}" id="timer-${t.id}">
                <div class="timer-display">${fmtTime(t.remaining)}</div>
                <div class="timer-info">
                    <div class="timer-name">${t.name}</div>
                    <div class="timer-meta">${meta}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%"></div></div>
                </div>
                <div class="timer-controls">
                    <button onclick="togglePause(${t.id})" title="${t.state==='paused'?'Resume':'Pause'}">${pauseIcon}</button>
                    <button onclick="resetTimer(${t.id})" title="Reset">↻</button>
                    <button onclick="removeTimer(${t.id})" title="Remove">✕</button>
                </div>
            </div>`;
        }).join('');
    }

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    renderPresets();
    renderTimers();
    </script>
</body>
</html>
