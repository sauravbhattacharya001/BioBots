codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: 70%

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

flags:
  unittests:
    paths:
      - Try/scripts/
    carryforward: true
  sdk:
    paths:
      - docs/shared/
      - index.js
    carryforward: true

ignore:
  - "Try/scripts/ai.*.js"
  - "docs/**"
  - "__tests__/**"
  - "*.config"
  - "*.json"
