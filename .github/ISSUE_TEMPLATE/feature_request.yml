---
name: ✨ Feature Request
description: Suggest a new feature or enhancement for BioBots
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve BioBots? We'd love to hear it! Please describe the feature clearly.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area does this feature relate to?
      options:
        - New metric / data field
        - API endpoint enhancement
        - Web UI improvement
        - Data visualization
        - Documentation
        - Testing / CI
        - Performance
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the motivation?
      placeholder: "Currently there's no way to filter print runs by date range, making it hard to analyze trends over time."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you'd like to see.
      placeholder: |
        Add a date range filter to the API:
        - New endpoint: GET api/prints/dateRange/{start}/{end}
        - Add date fields to the Print model
        - Update the web UI with date picker inputs
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered?

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How significant is this feature?
      options:
        - Low — nice to have
        - Medium — would improve the experience
        - High — blocking a use case
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any mockups, examples from other projects, or references.
