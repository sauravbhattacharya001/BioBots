# Copilot Setup Steps
# This workflow installs dependencies and builds the project so that
# GitHub Copilot coding agents (Claude, Codex) can autonomously work
# on issues and pull requests.
#
# BioBots is a .NET Framework 4.5.2 ASP.NET Web API project that uses
# NuGet for package management and MSBuild for compilation.

name: "Copilot Setup"

on: workflow_dispatch

jobs:
  setup:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: "latest"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore BioBotsTool.sln

      - name: Build solution
        run: msbuild BioBotsTool.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Build /verbosity:minimal
