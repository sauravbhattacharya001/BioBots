# Copilot Setup Steps
# This workflow installs dependencies and builds the project so that
# GitHub Copilot coding agents (Claude, Codex) can autonomously work
# on issues and pull requests.
#
# BioBots is a hybrid project:
# - .NET Framework 4.5.2 ASP.NET Web API (C# backend)
# - JavaScript frontend with Jest test suite (4800+ tests across 125 files)
# - Python evolution_tracker module with pytest tests

name: "Copilot Setup"

on: workflow_dispatch

jobs:
  setup:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- .NET Backend ---
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: "latest"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore BioBotsTool.sln

      - name: Build solution
        run: msbuild BioBotsTool.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Build /verbosity:minimal

      # --- JavaScript Frontend Tests ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

      - name: Verify coverage thresholds
        run: npm run coverage:check

      # --- Python Module ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Run Python tests
        run: pytest tests/ -v
